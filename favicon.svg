<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e202a"/>
      <stop offset="100%" stop-color="#0f1015"/>
    </linearGradient>

    <!-- Accent Emerald Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded Box Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  <rect width="496" height="496" x="8" y="8" rx="120" fill="none" stroke="#252834" stroke-width="16"/>

  <!-- Stylish 'R' + Trend Icon Integration -->
  <path d="M 160 380 L 160 132 L 280 132 C 340 132, 370 160, 370 206 C 370 250, 340 276, 280 276 L 160 276" 
        fill="none" 
        stroke="url(#accentGrad)" 
        stroke-width="52" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
        
  <!-- Trend Bar / Leg of 'R' -->
  <path d="M 260 276 L 360 380" 
        fill="none" 
        stroke="#6366f1" 
        stroke-width="52" 
        stroke-linecap="round"/>

  <!-- Metric Dot -->
  <circle cx="360" cy="132" r="28" fill="#10b981"/>
</svg>
